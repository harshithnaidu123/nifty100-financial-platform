<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nifty100 Financial Intelligence Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(
    135deg,
    #06111f,
    #0a1930,
    #0f2745,
    #06111f);

    min-height:100vh;

    color:white;

    overflow-x:hidden;
}

/* NAVBAR */

.navbar-custom{

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:blur(20px);

    border-bottom:
    1px solid rgba(255,255,255,0.1);

    padding:18px 40px;
}

.logo{

    font-size:32px;

    font-weight:800;

    background:
    linear-gradient(
    90deg,
    #00d4ff,
    #4ade80);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.nav-link{

    color:white !important;

    font-weight:600;
}

.nav-link:hover{

    color:#00d4ff !important;
}

/* GLASS CARD */

.glass-card{

    background:
    rgba(255,255,255,0.06);

    border:
    1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    border-radius:24px;
}

/* GLOWS */

body::before{

    content:"";

    position:fixed;

    width:500px;
    height:500px;

    background:#00d4ff;

    filter:blur(180px);

    opacity:.15;

    top:-100px;
    left:-100px;

    z-index:-1;
}

body::after{

    content:"";

    position:fixed;

    width:500px;
    height:500px;

    background:#4ade80;

    filter:blur(180px);

    opacity:.15;

    bottom:-100px;
    right:-100px;

    z-index:-1;
}

.market-ticker{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(15px);
    color:white;
    padding:10px;
    font-weight:600;
    border-top:1px solid rgba(255,255,255,.1);
    border-bottom:1px solid rgba(255,255,255,.1);
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">

<div class="container-fluid">

<a class="navbar-brand logo"
href="/">

📈 NIFTY100 AI

</a>

<div class="navbar-nav ms-auto">

<a class="nav-link" href="/">
Home
</a>

<a class="nav-link" href="/api/companies/">
Companies
</a>

<a class="nav-link" href="/revenue-forecast/">
Forecasting
</a>

</div>

</div>

</nav>

<div class="market-ticker">
    <marquee>
        📈 NIFTY50 +1.25%
        🏦 BANKNIFTY +0.92%
        🚀 RELIANCE +2.5%
        💹 TCS +1.8%
        📊 INFY +1.4%
        📉 LT +0.9%
    </marquee>
</div>

<div class="container-fluid mt-4">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
